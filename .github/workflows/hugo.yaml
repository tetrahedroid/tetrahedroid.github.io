# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.122.0
      # npm package "sass" (Dart Sass); bump when you need newer Sass features.
      DART_SASS_VERSION: 1.99.0
    steps:
      - name: Install Hugo CLI
        run: |
          set -euo pipefail
          set -x
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"
          hugo version
      - name: Install Dart Sass
        run: |
          set -euo pipefail
          set -x
          node --version
          npm --version
          # GitHub-hosted runners ship Node/npm; global "sass" avoids linux-x64 tarball on arm64.
          npm install -g "sass@${DART_SASS_VERSION}"
          command -v sass
          sass --version
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install Node.js dependencies
        run: |
          set -euo pipefail
          set -x
          if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          fi
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          set -euo pipefail
          set -x
          hugo \
            --gc \
            --minify \
            --logLevel info \
            --source=exampleSite -d ../public \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
          echo "::group::Build output sanity check"
          du -sh public
          find public -type f | wc -l
          echo "::endgroup::"
          if [[ ! -d public ]] || [[ -z "$(find public -mindepth 1 -print -quit)" ]]; then
            echo "::error::Hugo produced an empty ./public directory (see Hugo log above)."
            exit 1
          fi
        # the contents are written in a temporary folder "public"
        # and is visible as https://tetrahedroid.github.io
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4